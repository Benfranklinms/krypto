<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="980" viewBox="0 0 1200 980">
  <defs>
    <style>
      .page { fill: #ffffff; }
      .heading { font: 700 26px "Times New Roman", serif; fill: #111111; }
      .system-label { font: 700 18px "Arial", sans-serif; fill: #222222; }
      .caption { font: 400 22px "Times New Roman", serif; fill: #222222; }
      .actor-label { font: 400 18px "Arial", sans-serif; fill: #222222; }
      .usecase-text { font: 400 18px "Arial", sans-serif; fill: #222222; text-anchor: middle; dominant-baseline: middle; }
      .step-text { font: 400 14px "Arial", sans-serif; fill: #333333; text-anchor: middle; }
      .outline { stroke: #222222; stroke-width: 1.6; fill: none; }
      .box { stroke: #111111; stroke-width: 1.6; fill: none; }
      .dashed { stroke: #555555; stroke-width: 1.3; fill: none; stroke-dasharray: 4 4; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555555"/>
    </marker>
  </defs>

  <rect width="1200" height="980" class="page"/>

  <text x="70" y="70" class="heading">4.1.1 Use Case Diagram</text>

  <!-- System boundary -->
  <rect x="395" y="110" width="420" height="760" class="box"/>
  <text x="605" y="160" text-anchor="middle" class="system-label">Krypto system</text>

  <!-- Use cases -->
  <ellipse cx="605" cy="220" rx="140" ry="28" class="outline"/>
  <text x="605" y="220" class="usecase-text">Enter Plaintext / Ciphertext</text>

  <ellipse cx="605" cy="340" rx="140" ry="28" class="outline"/>
  <text x="605" y="340" class="usecase-text">Select Cipher Type</text>

  <ellipse cx="605" cy="460" rx="150" ry="28" class="outline"/>
  <text x="605" y="460" class="usecase-text">Send Encryption Request</text>

  <ellipse cx="605" cy="580" rx="140" ry="28" class="outline"/>
  <text x="605" y="580" class="usecase-text">Encrypt Text</text>

  <ellipse cx="605" cy="700" rx="140" ry="28" class="outline"/>
  <text x="605" y="700" class="usecase-text">Detect and Decrypt</text>

  <ellipse cx="605" cy="820" rx="148" ry="28" class="outline"/>
  <text x="605" y="820" class="usecase-text">Receive Result and Key</text>

  <!-- Dashed vertical flow -->
  <line x1="605" y1="248" x2="605" y2="306" class="dashed" marker-end="url(#arrow)"/>
  <text x="605" y="287" class="step-text">Chooses</text>

  <line x1="605" y1="368" x2="605" y2="426" class="dashed" marker-end="url(#arrow)"/>
  <text x="605" y="407" class="step-text">Submits</text>

  <line x1="605" y1="488" x2="605" y2="546" class="dashed" marker-end="url(#arrow)"/>
  <text x="605" y="527" class="step-text">Processes</text>

  <line x1="605" y1="608" x2="605" y2="666" class="dashed" marker-end="url(#arrow)"/>
  <text x="605" y="647" class="step-text">Or analyzes ciphertext</text>

  <line x1="605" y1="728" x2="605" y2="786" class="dashed" marker-end="url(#arrow)"/>
  <text x="605" y="767" class="step-text">Returns</text>

  <!-- Left actor: User -->
  <circle cx="185" cy="450" r="17" class="outline"/>
  <line x1="185" y1="467" x2="185" y2="535" class="outline"/>
  <line x1="155" y1="490" x2="215" y2="490" class="outline"/>
  <line x1="185" y1="535" x2="158" y2="580" class="outline"/>
  <line x1="185" y1="535" x2="212" y2="580" class="outline"/>
  <text x="185" y="603" text-anchor="middle" class="actor-label">User</text>

  <!-- Actor associations -->
  <line x1="215" y1="515" x2="470" y2="220" class="outline"/>
  <line x1="215" y1="515" x2="470" y2="340" class="outline"/>
  <line x1="215" y1="515" x2="470" y2="460" class="outline"/>
  <line x1="215" y1="515" x2="470" y2="820" class="outline"/>

  <!-- Caption -->
  <text x="600" y="930" text-anchor="middle" class="caption">Figure 4.1: Use Case Diagram</text>
</svg>
